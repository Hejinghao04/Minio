services:
  # ========== MySQL ==========
  mysql:
    image: mysql:8.0
    container_name: minio-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: minioupload
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== MinIO ==========
  minio:
    image: minio/minio:latest
    container_name: minio-server
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"    # API
      - "9001:9001"    # Web 管理页面
    volumes:
      - minio-data:/data
      - /etc/localtime:/etc/localtime:ro

  # ========== Spring Boot 后端 ==========
  backend:
    build: .
    container_name: minio-backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/minioupload?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      DB_USERNAME: root
      DB_PASSWORD: root
      MINIO_SERVER_IP: http://minio:9000
      MINIO_USERNAME: minioadmin
      MINIO_PASSWORD: minioadmin
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started

  # ========== Nginx 前端 ==========
  frontend:
    image: nginx:alpine
    container_name: minio-frontend
    ports:
      - "80:80"
    volumes:
      - ./minio-ui/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  mysql-data:
  minio-data:
